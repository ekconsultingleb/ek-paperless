[theme]
# ── EK Consulting Brand Theme — Dark Edition ──────────────────────────────
# PANTONE 433 C  → #1B252C  (charcoal — your exact brand dark)
# PANTONE 4685 C → #E3C5AD  (warm sand — your exact brand accent)

# Accent color — your exact brand sand (buttons, sliders, checkboxes, links)
primaryColor            = "#E3C5AD"

# Main background — deep charcoal (your brand dark, not generic #1E1E1E)
backgroundColor         = "#1B252C"

# Sidebar + input boxes — slightly lighter charcoal for depth
secondaryBackgroundColor = "#2E3D47"

# Text — warm off-white (easier on eyes than pure #F5F5F5)
textColor               = "#EDE8E0"

# Font
font                    = "sans serif"

[server]
headless = true